<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OAP Contest Manager</title>
    <meta
      name="description"
      content="Generate UIL One-Act Play contest documents. Works fully offline on contest day."
    />
    <!-- PWA (Slice 15, #28). The web manifest link is injected by vite-plugin-pwa
         at build time; these are the bits it does not manage. -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="theme-color" content="#00555a" />
    <!-- Set the theme before first paint so a dark-mode user never sees a light
         flash (Slice 18, #50). ui/theme.ts keeps it in sync afterwards, and also
         updates the theme-color meta above to match the resolved theme. -->
    <script>
      (function () {
        try {
          var p = localStorage.getItem('oap-theme') || 'system';
          var dark =
            p === 'dark' ||
            (p === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
          document
            .querySelector('meta[name="theme-color"]')
            .setAttribute('content', dark ? '#14201d' : '#00555a');
        } catch (e) {}
      })();
    </script>
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="OAP CM" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
